<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Starling Spaces{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.3"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/modern-css-reset/dist/reset.min.css" />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background-color: #101215;
        color: #f8f9fb;
        margin: 0;
        padding: 0 1.5rem 1.5rem;
      }
      main {
        max-width: 960px;
        margin: 0 auto;
        }
      header {
        margin-bottom: 1.5rem;
      }
      .card {
        background-color: #1a1d21;
        border-radius: 12px;
        padding: 1.5rem;
        margin-bottom: 1rem;
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.25);
      }
      .grid {
        display: grid;
        gap: 1rem;
      }
      @media (min-width: 768px) {
        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      h1, h2 {
        margin: 0 0 0.75rem;
      }
      dl {
        margin: 0;
      }
      dt {
        font-weight: 600;
      }
      dd {
        margin: 0 0 0.5rem;
      }
      button.refresh {
        background: #34d399;
        color: #101215;
        border: none;
        border-radius: 999px;
        padding: 0.4rem 1rem;
        font-weight: 600;
        cursor: pointer;
      }
      button.refresh:disabled {
        opacity: 0.6;
        cursor: progress;
      }
      .nav {
        background: rgba(16, 24, 39, 0.95);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .nav__inner {
        max-width: 960px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.75rem 0;
      }
      .nav__brand {
        color: #f9fafb;
        font-weight: 700;
        text-decoration: none;
        letter-spacing: 0.02em;
      }
      .nav__links {
        display: flex;
        gap: 1rem;
      }
      .nav__links a {
        color: #d1d5db;
        text-decoration: none;
        font-weight: 500;
      }
      .nav__links a:hover {
        color: #34d399;
      }
      main {
        padding-top: 1.5rem;
      }
    </style>
    {% block head %}{% endblock %}
  </head>
  <body>
    <header class="nav">
      <div class="nav__inner">
        <a class="nav__brand" href="/">Starling Spaces</a>
        <nav class="nav__links">
          <a href="/">Overview</a>
          <a href="/spending/">Spending</a>
        </nav>
      </div>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
