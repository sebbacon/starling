<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Starling Spaces{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.3"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/modern-css-reset/dist/reset.min.css" />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #f4f7fb 0%, #eef3f9 100%);
        color: #0f172a;
        margin: 0;
        padding: 0 1.5rem 1.5rem;
      }
      main {
        max-width: 960px;
        margin: 0 auto;
        }
      header {
        margin-bottom: 1.5rem;
      }
      .card {
        background-color: #ffffff;
        border: 1px solid #dbe3ef;
        border-radius: 12px;
        padding: 1.5rem;
        margin-bottom: 1rem;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      }
      .grid {
        display: grid;
        gap: 1rem;
      }
      @media (min-width: 768px) {
        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      h1, h2 {
        margin: 0 0 0.75rem;
      }
      dl {
        margin: 0;
      }
      dt {
        font-weight: 600;
      }
      dd {
        margin: 0 0 0.5rem;
      }
      button.refresh {
        background: #34d399;
        color: #101215;
        border: none;
        border-radius: 999px;
        padding: 0.4rem 1rem;
        font-weight: 600;
        cursor: pointer;
      }
      button.refresh:disabled {
        opacity: 0.6;
        cursor: progress;
      }
      .spending-table {
        width: 100%;
        border-collapse: collapse;
      }
      .spending-table th,
      .spending-table td {
        padding: 0.5rem 0.75rem;
        border-bottom: 1px solid #e3eaf3;
        text-align: left;
      }
      .spending-table th {
        font-weight: 600;
        color: #334155;
      }
      .nav {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid #dbe3ef;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .nav__inner {
        max-width: 960px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.75rem 0;
      }
      .nav__group {
        display: flex;
        align-items: center;
        gap: 1.5rem;
      }
      .nav__brand {
        color: #0f172a;
        font-weight: 700;
        text-decoration: none;
        letter-spacing: 0.02em;
      }
      .nav__links {
        display: flex;
        gap: 1rem;
      }
      .nav__links a {
        color: #334155;
        text-decoration: none;
        font-weight: 500;
      }
      .nav__links a:hover {
        color: #0f766e;
      }
      .nav__form {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .nav__form input[type="search"] {
        background: #ffffff;
        border: 1px solid #cbd5e1;
        border-radius: 20px;
        padding: 0.35rem 0.75rem;
        color: #0f172a;
        min-width: 220px;
      }
      .nav__form input[type="search"]::placeholder {
        color: #64748b;
      }
      .nav__form button {
        background: #0f766e;
        color: #ffffff;
        border: none;
        border-radius: 999px;
        padding: 0.35rem 0.85rem;
        font-weight: 600;
        cursor: pointer;
      }
      .nav__form button:hover {
        background: #115e59;
      }
      main {
        padding-top: 1.5rem;
      }
    </style>
    {% block head %}{% endblock %}
  </head>
  <body>
    <header class="nav">
      <div class="nav__inner">
        <div class="nav__group">
          <a class="nav__brand" href="/">Starling Spaces</a>
          <nav class="nav__links">
            <a href="/">Overview</a>
            <a href="/spending/">Spending</a>
            <a href="/income/">Income</a>
            <a href="/cashflow/">Cashflow</a>
            <a href="/savings/">Savings</a>
            <a href="/things-to-do/">Things to do</a>
            <a href="/categories/">Categories</a>
            <a href="/rules/">Rules</a>
          </nav>
        </div>
        <form class="nav__form" action="/spending/" method="get">
          <input
            type="search"
            name="search"
            value="{{ request.GET.search|default:'' }}"
            placeholder="Search counterparty or amount"
          />
          <button type="submit">Search</button>
        </form>
      </div>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
