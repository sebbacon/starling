{% extends "base.html" %}

{% block title %}Spaces Overview{% endblock %}

{% block content %}
  <header>
    <h1>Starling Spaces Summary</h1>
    <p>Live view of recent spending and balances per space.</p>
  </header>

  <div
    id="spaces-summary"
    hx-get="{% url 'spaces:summary' %}"
    hx-trigger="load, every 60s"
    hx-target="#spaces-summary"
    hx-swap="innerHTML"
  >
    {% include "spaces/_summary.html" %}
  </div>

  <p>
    <button
      class="refresh"
      hx-get="{% url 'spaces:summary' %}"
      hx-target="#spaces-summary"
      hx-swap="innerHTML"
    >
      Refresh now
    </button>
  </p>
{% endblock %}
