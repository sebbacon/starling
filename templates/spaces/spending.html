{% extends "base.html" %}

{% block title %}Spending Overview{% endblock %}

{% block content %}
  <header>
    <h1>Spending Overview</h1>
    <p>Stacked view of actual spend grouped by category over the last {{ summary_days }} days.</p>
  </header>

  <style>
    #transactions-card[hidden] {
      display: none;
    }
    .transactions-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }
    .transactions-header button {
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      border: 1px solid #2f3c52;
      background: transparent;
      color: #2f3c52;
      cursor: pointer;
    }
    .transactions-header button:hover {
      background: #2f3c52;
      color: #fff;
    }
    #transaction-table {
      width: 100%;
      border-collapse: collapse;
    }
    #transaction-table th,
    #transaction-table td {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid #e1e6ef;
      text-align: left;
    }
    #transaction-table td.numeric {
      text-align: right;
    }
    #transaction-table tbody tr:hover {
      background: #f5f8ff;
    }
  </style>

  <section class="card">
    <canvas id="spending-chart" height="320"></canvas>
  </section>

  <section class="card" id="transactions-card" hidden>
    <div class="transactions-header">
      <h2 id="transactions-title">Transactions</h2>
      <button type="button" id="reset-selection">Show all categories</button>
    </div>
    <table id="transaction-table">
      <thead>
        <tr>
          <th scope="col" data-sort-key="transactionTime" aria-sort="descending">Date</th>
          <th scope="col" data-sort-key="category" aria-sort="none">Category</th>
          <th scope="col" data-sort-key="counterparty" aria-sort="none">Counterparty</th>
          <th scope="col" data-sort-key="spaceName" aria-sort="none">Space</th>
          <th scope="col" data-sort-key="source" aria-sort="none">Source</th>
          <th scope="col" class="numeric" data-sort-key="amountMinorUnits" aria-sort="none">Amount</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
  <script>
    const palette = [
      // Combined Paul Tol colourblind-safe schemes to maximise distinct hues.
      '#4477AA', '#66CCEE', '#228833', '#CCBB44', '#EE6677', '#AA3377', '#BBBBBB',
      '#EE7733', '#0077BB', '#33BBEE', '#009988', '#CC3311', '#EE3377', '#117733',
      '#88CCEE', '#44AA99', '#DDCC77', '#CC6677', '#AA4499', '#77AADD', '#99DDFF',
      '#44BB99', '#BBCC33', '#EE8866', '#FFAABB'
    ];
    const colorAssignments = new Map();
    const transactionsEndpoint = "{% url 'spaces:spending-transactions' %}";
    const summaryDaysDefault = {{ summary_days }};
    const initialCategory = "{{ initial_category|escapejs }}";
    const initialCounterparty = "{{ initial_counterparty|escapejs }}";
    const baseSpendingUrl = "{{ base_spending_url|escapejs }}";
    const normalizedBasePath = baseSpendingUrl.endsWith('/') ? baseSpendingUrl : `${baseSpendingUrl}/`;
    const categoryPathBase = `${normalizedBasePath}category/`;
    const counterpartyBaseUrl = "{{ counterparty_base_url|escapejs }}";
    const counterpartyPathBase = counterpartyBaseUrl.endsWith('/') ? counterpartyBaseUrl : `${counterpartyBaseUrl}/`;
    let spendingSummary = null;
    let chartInstance = null;
    let currentFilter = null;
    let currentTransactions = [];
    let currentTransactionsMessage = null;
    const sortState = { column: 'transactionTime', direction: 'desc' };
    let chartMode = 'default';
    const STACK_CONFIG = {
      category: {
        mode: 'counterparty',
        stack: 'counterparty-stack',
        labelForTxn: (txn) => (txn.counterparty && txn.counterparty.trim()) || txn.spaceName || txn.source || 'Other',
      },
      counterparty: {
        mode: 'category',
        stack: 'category-stack',
        labelForTxn: (txn) => txn.category || 'Uncategorised',
      },
    };
    let selectedCategory = null;
    async function loadSpendingData() {
      const response = await fetch("{% url 'spaces:spending-data' %}?days={{ summary_days }}");
      if (!response.ok) {
        throw new Error('Unable to load spending data');
      }
      return response.json();
    }

    function sortTransactions(data) {
      const { column, direction } = sortState;
      const sorted = [...data];
      sorted.sort((a, b) => {
        let result = 0;
        if (column === 'transactionTime') {
          result = new Date(a[column]).getTime() - new Date(b[column]).getTime();
        } else if (column === 'amountMinorUnits') {
          result = (a[column] || 0) - (b[column] || 0);
        } else {
          result = (a[column] || '').localeCompare(b[column] || '', undefined, { sensitivity: 'base' });
        }
        return direction === 'asc' ? result : -result;
      });
      return sorted;
    }

    function updateSortIndicators() {
      document.querySelectorAll('#transaction-table th[data-sort-key]').forEach((th) => {
        if (!currentFilter || currentTransactionsMessage) {
          th.setAttribute('aria-sort', 'none');
          return;
        }
        const key = th.dataset.sortKey;
        if (key === sortState.column) {
          th.setAttribute('aria-sort', sortState.direction === 'asc' ? 'ascending' : 'descending');
        } else {
          th.setAttribute('aria-sort', 'none');
        }
      });
    }

    function hashLabel(label) {
      const normalised = (label || 'uncategorised').trim().toLowerCase();
      if (!colorAssignments.has(normalised)) {
        let hash = 0;
        for (let i = 0; i < normalised.length; i += 1) {
          hash = ((hash << 5) - hash) + normalised.charCodeAt(i);
          hash |= 0; // force into 32-bit space for portability
        }
        const index = Math.abs(hash) % palette.length;
        colorAssignments.set(normalised, palette[index]);
      }
      return colorAssignments.get(normalised);
    }

    function buildDefaultDatasets(series) {
      return series.map((item) => ({
        label: item.category,
        data: item.values,
        backgroundColor: hashLabel(item.category),
        stack: 'spend-stack',
        currency: item.currency || 'GBP',
      }));
    }

    function applyDefaultDatasets() {
      if (!chartInstance || !spendingSummary) {
        return;
      }
      chartMode = 'default';
      chartInstance.data.labels = [...spendingSummary.dates];
      chartInstance.data.datasets = buildDefaultDatasets(spendingSummary.series);
      chartInstance.update();
    }

    function formatMonthKey(isoString) {
      const dt = new Date(isoString);
      const year = dt.getUTCFullYear();
      const month = String(dt.getUTCMonth() + 1).padStart(2, '0');
      return `${year}-${month}-01`;
    }

    function applyStackedDatasets(filterType, transactions) {
      if (!chartInstance || !spendingSummary) {
        return;
      }
      const config = STACK_CONFIG[filterType];
      if (!config) {
        applyDefaultDatasets();
        return;
      }

      const monthLabels = new Set(spendingSummary.dates);
      const aggregates = new Map();

      transactions.forEach((txn) => {
        const amount = Number(txn.amountMinorUnits || 0);
        if (amount <= 0) {
          return;
        }
        const monthKey = formatMonthKey(txn.transactionTime);
        monthLabels.add(monthKey);
        const key = config.labelForTxn(txn);
        if (!aggregates.has(key)) {
          aggregates.set(key, { totals: new Map(), total: 0, currency: txn.currency || 'GBP' });
        }
        const entry = aggregates.get(key);
        entry.totals.set(monthKey, (entry.totals.get(monthKey) || 0) + amount);
        entry.total += amount;
      });

      const labels = Array.from(monthLabels).sort();
      if (!aggregates.size) {
        applyDefaultDatasets();
        return;
      }

      const datasets = Array.from(aggregates.entries())
        .sort((a, b) => b[1].total - a[1].total)
        .map(([name, data]) => ({
          label: name,
          data: labels.map((label) => (data.totals.get(label) || 0) / 100),
          backgroundColor: hashLabel(name),
          stack: config.stack,
          currency: data.currency,
        }));

      chartMode = config.mode;
      chartInstance.data.labels = labels;
      chartInstance.data.datasets = datasets;
      chartInstance.update();
    }

    function renderTransactionsTable() {
      const card = document.getElementById('transactions-card');
      const title = document.getElementById('transactions-title');
      const tbody = document.querySelector('#transaction-table tbody');

      if (!currentFilter) {
        card.hidden = true;
        updateSortIndicators();
        return;
      }

      card.hidden = false;
      title.textContent = currentFilter.label ? `Transactions: ${currentFilter.label}` : 'Transactions';

      tbody.innerHTML = '';

      if (currentTransactionsMessage) {
        const row = document.createElement('tr');
        const cell = document.createElement('td');
        cell.colSpan = 6;
        cell.textContent = currentTransactionsMessage;
        row.appendChild(cell);
        tbody.appendChild(row);
        updateSortIndicators();
        return;
      }

      if (!currentTransactions.length) {
        const row = document.createElement('tr');
        const cell = document.createElement('td');
        cell.colSpan = 6;
        cell.textContent = 'No transactions recorded for this selection in the chosen window.';
        row.appendChild(cell);
        tbody.appendChild(row);
        updateSortIndicators();
        return;
      }

      const sorted = sortTransactions(currentTransactions);

      sorted.forEach((txn) => {
        const row = document.createElement('tr');

        const dateCell = document.createElement('td');
        dateCell.textContent = new Date(txn.transactionTime).toLocaleString('en-GB', {
          dateStyle: 'short',
          timeStyle: 'short',
        });
        row.appendChild(dateCell);

        const categoryCell = document.createElement('td');
        categoryCell.textContent = txn.category || 'Uncategorised';
        row.appendChild(categoryCell);

        const counterpartyCell = document.createElement('td');
        counterpartyCell.textContent = txn.counterparty || '—';
        row.appendChild(counterpartyCell);

        const spaceCell = document.createElement('td');
        spaceCell.textContent = txn.spaceName || txn.spaceUid || '—';
        row.appendChild(spaceCell);

        const sourceCell = document.createElement('td');
        sourceCell.textContent = txn.source || '—';
        row.appendChild(sourceCell);

        const amountCell = document.createElement('td');
        amountCell.classList.add('numeric');
        const formatter = new Intl.NumberFormat('en-GB', { style: 'currency', currency: txn.currency || 'GBP' });
        amountCell.textContent = formatter.format((txn.amountMinorUnits || 0) / 100);
        row.appendChild(amountCell);

        tbody.appendChild(row);
      });

      updateSortIndicators();
    }

    function showTransactionsLoading(filter) {
      currentFilter = { ...filter, label: filter.label || filter.value };
      currentTransactions = [];
      currentTransactionsMessage = 'Loading…';
      sortState.column = 'transactionTime';
      sortState.direction = 'desc';
      if (filter.type === 'category') {
        selectedCategory = filter.value;
      } else {
        selectedCategory = null;
      }
      renderTransactionsTable();
    }

    function clearTransactions() {
      currentFilter = null;
      currentTransactions = [];
      currentTransactionsMessage = null;
      selectedCategory = null;
      renderTransactionsTable();
      applyDefaultDatasets();
    }

    async function loadTransactions(filter) {
      if (!spendingSummary) {
        return;
      }
      const prepared = { ...filter, label: filter.label || filter.value };
      showTransactionsLoading(prepared);

      const params = new URLSearchParams({
        days: spendingSummary.days ?? summaryDaysDefault,
        reference: spendingSummary.reference,
      });
      if (prepared.type === 'category') {
        params.set('category', prepared.value);
      } else if (prepared.type === 'counterparty') {
        params.set('counterparty', prepared.value);
      }

      try {
        const response = await fetch(`${transactionsEndpoint}?${params.toString()}`);
        if (!response.ok) {
          throw new Error('Failed to fetch transactions');
        }
        const payload = await response.json();
        currentFilter = prepared;
        currentTransactions = payload.transactions || [];
        currentTransactionsMessage = null;
        renderTransactionsTable();
        if (STACK_CONFIG[prepared.type]) {
          applyStackedDatasets(prepared.type, currentTransactions);
        } else {
          applyDefaultDatasets();
        }
      } catch (error) {
        currentFilter = prepared;
        currentTransactions = [];
        currentTransactionsMessage = 'Unable to load transactions. Please try again.';
        renderTransactionsTable();
        if (STACK_CONFIG[prepared.type]) {
          applyStackedDatasets(prepared.type, []);
        } else {
          applyDefaultDatasets();
        }
      }
    }

    function resetSelection() {
      selectedCategory = null;
      window.history.replaceState({}, '', normalizedBasePath);
      clearTransactions();
    }

    function handleSortClick(event) {
      const key = event.currentTarget.dataset.sortKey;
      if (!key || !currentFilter || currentTransactionsMessage) {
        return;
      }

      if (sortState.column === key) {
        sortState.direction = sortState.direction === 'asc' ? 'desc' : 'asc';
      } else {
        sortState.column = key;
        sortState.direction = key === 'transactionTime' ? 'desc' : 'asc';
      }

      renderTransactionsTable();
    }

    function handleChartClick(event) {
      if (!chartInstance) {
        return;
      }
      const points = chartInstance.getElementsAtEventForMode(
        event,
        'nearest',
        { intersect: true },
        false
      );
      if (!points.length) {
        return;
      }
      const [{ datasetIndex }] = points;
      const dataset = chartInstance.data.datasets[datasetIndex];
      if (!dataset) {
        return;
      }
      const selectedLabel = dataset.label;

      if (chartMode === 'counterparty') {
        window.location.href = `${counterpartyPathBase}${encodeURIComponent(selectedLabel)}/`;
        return;
      }

      if (currentFilter && currentFilter.type === 'category' && currentFilter.value === selectedLabel) {
        resetSelection();
        return;
      }

      const filter = { type: 'category', value: selectedLabel, label: selectedLabel };
      window.history.replaceState({}, '', `${categoryPathBase}${encodeURIComponent(selectedLabel)}/`);
      void loadTransactions(filter);
    }

    async function renderChart() {
      spendingSummary = await loadSpendingData();
      const ctx = document.getElementById('spending-chart').getContext('2d');

      chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: [],
          datasets: [],
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: function(context) {
                  const value = context.raw || 0;
                  const formatter = new Intl.NumberFormat('en-GB', { style: 'currency', currency: context.dataset.currency });
                  return `${context.dataset.label}: ${formatter.format(value)}`;
                }
              }
            }
          },
          scales: {
            x: { stacked: true },
            y: {
              stacked: true,
              ticks: {
                callback: function(value) {
                  const firstDataset = this.chart.data.datasets[0];
                  const currency = firstDataset?.currency || 'GBP';
                  const formatter = new Intl.NumberFormat('en-GB', { style: 'currency', currency, maximumFractionDigits: 0 });
                  return formatter.format(value);
                }
              }
            }
          }
        }
      });

      applyDefaultDatasets();

      document.getElementById('spending-chart').addEventListener('click', handleChartClick);
      document.getElementById('reset-selection').addEventListener('click', resetSelection);
      document.querySelectorAll('#transaction-table th[data-sort-key]').forEach((th) => {
        th.addEventListener('click', handleSortClick);
      });
      if (initialCategory && spendingSummary.series.some((item) => item.category === initialCategory)) {
        const filter = { type: 'category', value: initialCategory, label: initialCategory };
        window.history.replaceState({}, '', `${categoryPathBase}${encodeURIComponent(initialCategory)}/`);
        void loadTransactions(filter);
        return;
      }
      if (initialCounterparty) {
        const filter = { type: 'counterparty', value: initialCounterparty, label: initialCounterparty };
        window.history.replaceState({}, '', `${counterpartyPathBase}${encodeURIComponent(initialCounterparty)}/`);
        void loadTransactions(filter);
        return;
      }
      window.history.replaceState({}, '', normalizedBasePath);
      clearTransactions();
    }

    
    document.addEventListener('DOMContentLoaded', renderChart);
  </script>
{% endblock %}
