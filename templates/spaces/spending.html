{% extends "base.html" %}

{% block title %}Spending Overview{% endblock %}

{% block content %}
  <header>
    <h1>Spending Overview</h1>
    <p>Stacked view of actual spend grouped by category over the last {{ summary_days }} days.</p>
  </header>

  <section class="card">
    <canvas id="spending-chart" height="320"></canvas>
  </section>

  <section class="card">
    <table id="spending-table" class="spending-table">
      <thead>
        <tr>
          <th scope="col">Category</th>
          <th scope="col">Monthly average</th>
          <th scope="col">Total</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
  <script>
    const palette = [
      '#35b779', '#31688e', '#fde725', '#440154', '#f8961e', '#577590', '#43aa8b', '#f9c74f', '#90be6d', '#f3722c'
    ];

    async function loadSpendingData() {
      const response = await fetch("{% url 'spaces:spending-data' %}?days={{ summary_days }}");
      if (!response.ok) {
        throw new Error('Unable to load spending data');
      }
      return response.json();
    }

    function renderTable(series, months) {
      const table = document.getElementById('spending-table');
      const tbody = table.querySelector('tbody');
      tbody.innerHTML = '';

      if (!series.length) {
        const row = document.createElement('tr');
        const cell = document.createElement('td');
        cell.colSpan = 3;
        cell.textContent = 'No spend recorded for this window.';
        row.appendChild(cell);
        tbody.appendChild(row);
        return;
      }

      series.forEach((item, index) => {
        const row = document.createElement('tr');
        const formatter = new Intl.NumberFormat('en-GB', { style: 'currency', currency: item.currency || 'GBP' });

        const nameCell = document.createElement('td');
        nameCell.innerHTML = `<span style="display:inline-flex;align-items:center;gap:0.6rem;"><span style=\"width:14px;height:14px;border-radius:4px;background:${palette[index % palette.length]};display:inline-block;\"></span><strong>${item.category}</strong></span>`;
        row.appendChild(nameCell);

        const averageCell = document.createElement('td');
        averageCell.textContent = formatter.format(item.averageMinorUnits / 100);
        row.appendChild(averageCell);

        const totalCell = document.createElement('td');
        totalCell.textContent = formatter.format(item.totalMinorUnits / 100);
        row.appendChild(totalCell);

        tbody.appendChild(row);
      });
    }

    async function renderChart() {
      const data = await loadSpendingData();
      const ctx = document.getElementById('spending-chart').getContext('2d');
      const datasets = data.series.map((item, index) => ({
        label: item.category,
        data: item.values,
        backgroundColor: palette[index % palette.length],
        stack: 'spend-stack',
        currency: item.currency || 'GBP'
      }));

      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: data.dates,
          datasets
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: function(context) {
                  const value = context.raw || 0;
                  const formatter = new Intl.NumberFormat('en-GB', { style: 'currency', currency: context.dataset.currency });
                  return `${context.dataset.label}: ${formatter.format(value)}`;
                }
              }
            }
          },
          scales: {
            x: { stacked: true },
            y: {
              stacked: true,
              ticks: {
                callback: function(value) {
                  const formatter = new Intl.NumberFormat('en-GB', { style: 'currency', currency: datasets[0]?.currency || 'GBP', maximumFractionDigits: 0 });
                  return formatter.format(value);
                }
              }
            }
          }
        }
      });

      renderTable(data.series, data.months);
    }

    document.addEventListener('DOMContentLoaded', renderChart);
  </script>
{% endblock %}
